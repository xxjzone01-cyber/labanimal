      tags: [Electronic Signatures]
      parameters:
        - $ref: '#/components/parameters/LabId'
        - name: entityType
          in: query
          schema: { type: string }
        - name: entityId
          in: query
          schema: { type: string }
        - name: userId
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Signature list
    post:
      summary: Create electronic signature (auto-computes SHA-256 hash, records IP)
      tags: [Electronic Signatures]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entityType, entityId, meaning]
              properties:
                entityType: { type: string }
                entityId: { type: string }
                meaning: { type: string, enum: [approved, reviewed, witnessed, authored] }
                protocolId: { type: string }
                printedName: { type: string }
                title: { type: string }
                reasonForSigning: { type: string }
                notes: { type: string }
      responses:
        '201':
          description: Signature created

