openapi: 3.0.3
info:
  title: LabAnimal API
  description: |
    Open-source laboratory animal management system API.
    Compliance: AVMA euthanasia, 21 CFR Part 11, AAALAC, 3R principles.
  version: 0.2.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:3001/api
    description: Local development
  - url: https://labanimal.cloud/api
    description: Production (SaaS)

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication & registration
  - name: Labs
    description: Laboratory & membership management
  - name: Animals
    description: Animal records CRUD
  - name: Animal Identifiers
    description: Animal identification tags (ear tag, microchip, etc.)
  - name: Animal Links
    description: Animal lineage/transfer relationships
  - name: Rooms
    description: Facility rooms
  - name: Racks
    description: Cage racks within rooms
  - name: Cages
    description: Cage management & animal assignment
  - name: Protocols
    description: IACUC protocols with 3R validation
  - name: Health Records
    description: Health observations & treatments
  - name: Death Reports
    description: Death/euthanasia reporting with AVMA validation
  - name: Medications
    description: Medication administration records
  - name: Breedings
    description: Breeding pairs & litter tracking
  - name: Enrichments
    description: Environmental enrichment records
  - name: Trainings
    description: Personnel training & certification
  - name: Work Sessions
    description: Daily work session tracking
  - name: Audit Log
    description: Tamper-evident audit trail (SHA-256 chain)
  - name: Electronic Signatures
    description: 21 CFR Part 11 compliant e-signatures
  - name: Batch Sessions
    description: Material/supply batch tracking
  - name: Rates
    description: Per-diem billing rates
  - name: Billing
    description: Usage reports & billing generation
  - name: License
    description: Report signing & license verification
  - name: Subscriptions
    description: PayPal subscription management
  - name: Stripe
    description: Stripe checkout & webhooks

paths:
  # ── Health ──────────────────────────────────────────────
  /health:
    get:
      summary: Health check
      security: []
      tags: [Auth]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  version: { type: string }
                  timestamp: { type: string, format: date-time }

  # ── Auth ────────────────────────────────────────────────
  /auth/register:
    post:
      summary: Register a new user
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8, description: Must contain uppercase, lowercase, and number }
                name: { type: string }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered

  /auth/login:
    post:
      summary: User login
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
                  labs:
                    type: array
                    items: { $ref: '#/components/schemas/Lab' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: User logout (stateless — client discards token)
      tags: [Auth]
      responses:
        '200':
          description: Logged out

  # ── Labs ────────────────────────────────────────────────
  /labs:
    post:
      summary: Create laboratory (creator becomes PI)
      tags: [Labs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                institution: { type: string }
                address: { type: string }
      responses:
        '201':
          description: Lab created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Lab' }

  /labs/{id}:
    get:
      summary: Get lab details with members
      tags: [Labs]
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Lab details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Lab' }
        '404':
          $ref: '#/components/responses/NotFound'

  /labs/{id}/members:
    get:
      summary: List lab members
      tags: [Labs]
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LabMember' }
    post:
      summary: Add lab member (PI/admin only)
      tags: [Labs]
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, role]
              properties:
                userId: { type: string }
                role: { type: string, enum: [pi, admin, veterinarian, researcher, technician] }
      responses:
        '201':
          description: Member added
        '409':
          description: Already a member

  /labs/{id}/members/{userId}:
    delete:
      summary: Remove lab member (cannot remove self)
      tags: [Labs]
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Member removed
        '400':
          description: Cannot remove yourself

  # ── Animals ─────────────────────────────────────────────
  /animals:
    get:
      summary: List animals (paginated, filterable)
      tags: [Animals]
      parameters:
        - $ref: '#/components/parameters/LabId'
        - name: species
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [active, deceased, transferred, retired] }
        - name: search
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Animal list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Animal' }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
    post:
      summary: Create animal
      tags: [Animals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [labId, internalId, species, sex]
              properties:
                labId: { type: string }
                internalId: { type: string }
                species: { type: string }
                sex: { type: string, enum: [male, female, unknown] }
                strain: { type: string }
                genotype: { type: string }
                dateOfBirth: { type: string, format: date }
                source: { type: string }
                cageId: { type: string }
                protocolId: { type: string }
                notes: { type: string }
      responses:
        '201':
          description: Animal created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }

  /animals/{id}:
    get:
      summary: Get animal details (includes cage, protocol, recent health records)
      tags: [Animals]
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Animal details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
    put:
      summary: Update animal
      tags: [Animals]
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                internalId: { type: string }
                species: { type: string }
                strain: { type: string }
                genotype: { type: string }
                sex: { type: string, enum: [male, female, unknown] }
                dateOfBirth: { type: string, format: date }
                source: { type: string }
                cageId: { type: string }
                protocolId: { type: string }
                status: { type: string }
                notes: { type: string }
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete animal
      tags: [Animals]
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Deleted

  /animals/{id}/release-quarantine:
    post:
      summary: Release animal from quarantine (veterinarian/PI only)
      tags: [Animals]
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Released
        '403':
          description: Role not permitted

  # ── Animal Identifiers ──────────────────────────────────
  /animal-identifiers:
    get:
      summary: List animal identifiers
      tags: [Animal Identifiers]
      parameters:
        - $ref: '#/components/parameters/LabId'
        - name: animalId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Identifier list
    post:
      summary: Create animal identifier (first one auto-set as primary)
      tags: [Animal Identifiers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animalId, type, value]
              properties:
                animalId: { type: string }
                type: { type: string, enum: [ear_tag, microchip, tattoo, tail_mark, other] }
                value: { type: string }
                isPrimary: { type: boolean }
                notes: { type: string }
      responses:
        '201':
          description: Created

  /animal-identifiers/{id}:
    get:
      summary: Get identifier details
      tags: [Animal Identifiers]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Identifier
    put:
      summary: Update identifier
      tags: [Animal Identifiers]
      parameters: [$ref: '#/components/parameters/Id']
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string }
                value: { type: string }
                isPrimary: { type: boolean }
                notes: { type: string }
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete identifier
      tags: [Animal Identifiers]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Deleted

  # ── Animal Links ────────────────────────────────────────
  /animal-links:
    get:
      summary: List animal relationships
      tags: [Animal Links]
      parameters:
        - $ref: '#/components/parameters/LabId'
        - name: animalId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Link list
    post:
      summary: Create animal link (old animal marked retired)
      tags: [Animal Links]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animalId, linkedToId, reason]
              properties:
                animalId: { type: string }
                linkedToId: { type: string }
                reason: { type: string }
      responses:
        '201':
          description: Created

  /animal-links/{id}:
    get:
      summary: Get link details
      tags: [Animal Links]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Link details
    delete:
      summary: Delete link
      tags: [Animal Links]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Deleted

  # ── Rooms ───────────────────────────────────────────────
  /rooms:
    get:
      summary: List rooms with cage/animal stats
      tags: [Rooms]
      parameters:
        - $ref: '#/components/parameters/LabId'
      responses:
        '200':
          description: Room list
    post:
      summary: Create room
      tags: [Rooms]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [labId, name]
              properties:
                labId: { type: string }
                name: { type: string }
                location: { type: string }
                building: { type: string }
                floor: { type: string }
                capacity: { type: integer }
                temperatureMin: { type: number }
                temperatureMax: { type: number }
                humidityMin: { type: number }
                humidityMax: { type: number }
      responses:
        '201':
          description: Room created

  /rooms/{id}:
    get:
      summary: Get room details (nested racks/cages/animals/enrichments)
      tags: [Rooms]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Room details
    put:
      summary: Update room
      tags: [Rooms]
      parameters: [$ref: '#/components/parameters/Id']
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                location: { type: string }
                building: { type: string }
                floor: { type: string }
                capacity: { type: integer }
                temperatureMin: { type: number }
                temperatureMax: { type: number }
                humidityMin: { type: number }
                humidityMax: { type: number }
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete room (fails if has cages)
      tags: [Rooms]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Deleted
        '400':
          description: Room has cages

  # ── Racks ───────────────────────────────────────────────
  /racks:
    get:
      summary: List racks in a room
      tags: [Racks]
      parameters:
        - name: roomId
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rack list
    post:
      summary: Create rack
      tags: [Racks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId, name]
              properties:
                roomId: { type: string }
                name: { type: string }
                layers: { type: integer }
                positionsPerLayer: { type: integer }
      responses:
        '201':
          description: Rack created

  /racks/{id}:
    get:
      summary: Get rack details (cages & animals)
      tags: [Racks]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Rack details
    put:
      summary: Update rack
      tags: [Racks]
      parameters: [$ref: '#/components/parameters/Id']
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                layers: { type: integer }
                positionsPerLayer: { type: integer }
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete rack
      tags: [Racks]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Deleted

  # ── Cages ───────────────────────────────────────────────
  /cages:
    get:
      summary: List cages in a rack
      tags: [Cages]
      parameters:
        - name: rackId
          in: query
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [available, occupied, maintenance, quarantine] }
      responses:
        '200':
          description: Cage list
    post:
      summary: Create cage
      tags: [Cages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rackId, position]
              properties:
                rackId: { type: string }
                position: { type: string }
                status: { type: string }
                capacity: { type: integer }
                isSingleHoused: { type: boolean }
                singleHousingReason: { type: string }
                singleHousingUntil: { type: string, format: date-time }
      responses:
        '201':
          description: Cage created

  /cages/{id}:
    get:
      summary: Get cage details (animals & enrichments)
      tags: [Cages]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Cage details
    put:
      summary: Update cage
      tags: [Cages]
      parameters: [$ref: '#/components/parameters/Id']
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string }
                capacity: { type: integer }
                isSingleHoused: { type: boolean }
                singleHousingReason: { type: string }
                singleHousingUntil: { type: string, format: date-time }
                lastCleaned: { type: string, format: date-time }
                nextCleaning: { type: string, format: date-time }
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete cage (fails if has animals)
      tags: [Cages]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Deleted

  /cages/{id}/assign-animal:
    post:
      summary: Assign animal to cage (density compliance check + quarantine validation)
      tags: [Cages]
      parameters: [$ref: '#/components/parameters/Id']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animalId]
              properties:
                animalId: { type: string }
      responses:
        '200':
          description: Assigned

  /cages/{id}/remove-animal:
    post:
      summary: Remove animal from cage
      tags: [Cages]
      parameters: [$ref: '#/components/parameters/Id']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animalId]
              properties:
                animalId: { type: string }
      responses:
        '200':
          description: Removed

  # ── Protocols ───────────────────────────────────────────
  /protocols:
    get:
      summary: List protocols with animal counts
      tags: [Protocols]
      parameters:
        - $ref: '#/components/parameters/LabId'
      responses:
        '200':
          description: Protocol list
    post:
      summary: Create IACUC protocol
      tags: [Protocols]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [labId, title, piName]
              properties:
                labId: { type: string }
                title: { type: string }
                piName: { type: string }
                description: { type: string }
                iacucNumber: { type: string }
                status: { type: string, enum: [draft, submitted, approved, rejected, expired] }
                painCategory: { type: string, enum: [A, B, C, D, E] }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date }
                animalLimit: { type: integer }
                densityExemption: { type: boolean }
                threeRsReplacement: { type: string }
                threeRsReduction: { type: string }
                threeRsRefinement: { type: string }
                hasStatisticalJustification: { type: boolean }
                involvesSurgery: { type: boolean }
                survivalSurgery: { type: boolean }
                usesAnalgesics: { type: boolean }
                hasHumaneEndpoints: { type: boolean }
      responses:
        '201':
          description: Protocol created

  /protocols/{id}:
    get:
      summary: Get protocol details (with linked animals)
      tags: [Protocols]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Protocol details
    put:
      summary: Update protocol (validates status transitions)
      tags: [Protocols]
      parameters: [$ref: '#/components/parameters/Id']
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                piName: { type: string }
                iacucNumber: { type: string }
                status: { type: string }
                painCategory: { type: string }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date }
                animalLimit: { type: integer }
                reviewComments: { type: string }
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete protocol (fails if approved with animals)
      tags: [Protocols]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Deleted

  /protocols/{id}/validate:
    post:
      summary: Run 3R compliance validation
      tags: [Protocols]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  warnings:
                    type: array
                    items: { type: string }

  # ── Health Records ──────────────────────────────────────
  /health-records:
    get:
      summary: List health records (paginated)
      tags: [Health Records]
      parameters:
        - $ref: '#/components/parameters/LabId'
        - name: animalId
          in: query
          schema: { type: string }
        - name: recordType
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Health record list
    post:
      summary: Create health record (euthanasia records validated against AVMA methods)
      tags: [Health Records]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animalId, recordType]
              properties:
                animalId: { type: string }
                recordType: { type: string, enum: [observation, treatment, euthanasia, procedure, other] }
                weight: { type: number }
                bodyConditionScore: { type: number, minimum: 1, maximum: 5 }
                painScore: { type: integer }
                painScoreType: { type: string, enum: [MGS, RGS] }
                description: { type: string }
                treatment: { type: string }
                euthanasiaMethodId: { type: string }
      responses:
        '201':
          description: Record created

  /health-records/{id}:
    get:
      summary: Get health record details
      tags: [Health Records]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Health record
    put:
      summary: Update health record
      tags: [Health Records]
      parameters: [$ref: '#/components/parameters/Id']
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                recordType: { type: string }
                weight: { type: number }
                bodyConditionScore: { type: number }
                painScore: { type: integer }
                painScoreType: { type: string }
                description: { type: string }
                treatment: { type: string }
                euthanasiaMethodId: { type: string }
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete health record
      tags: [Health Records]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Deleted

  # ── Death Reports ───────────────────────────────────────
  /death-reports:
    get:
      summary: List death reports (paginated)
      tags: [Death Reports]
      parameters:
        - $ref: '#/components/parameters/LabId'
        - name: animalId
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Death report list
    post:
      summary: Create death report (auto-sets animal status to deceased; euthanasia requires AVMA method)
      tags: [Death Reports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animalId, labId, dateOfDeath, cause]
              properties:
                animalId: { type: string }
                labId: { type: string }
                dateOfDeath: { type: string, format: date }
                cause: { type: string }
                euthanasiaMethodId: { type: string }
                performedBy: { type: string }
                necropsyPerformed: { type: boolean }
                necropsyFindings: { type: string }
                notes: { type: string }
      responses:
        '201':
          description: Report created

  /death-reports/{id}:
    get:
      summary: Get death report details
      tags: [Death Reports]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Death report
    put:
      summary: Update death report
      tags: [Death Reports]
      parameters: [$ref: '#/components/parameters/Id']
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
