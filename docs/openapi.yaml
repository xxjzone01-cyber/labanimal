      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Signature

  /electronic-signatures/{id}/verify:
    get:
      summary: Verify signature integrity (recomputes hash and compares)
      tags: [Electronic Signatures]
      parameters: [$ref: '#/components/parameters/Id']
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  expectedHash: { type: string }
                  actualHash: { type: string }

