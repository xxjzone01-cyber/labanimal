  # ── Billing ─────────────────────────────────────────────
  /billing/generate:
    get:
      summary: Generate billing report (per-diem: species count x daily rate x days + cage fees)
      tags: [Billing]
      parameters:
        - $ref: '#/components/parameters/LabId'
        - name: startDate
          in: query
          required: true
          schema: { type: string, format: date }
        - name: endDate
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Billing report
          content:
            application/json:
              schema:
                type: object
                properties:
                  labId: { type: string }
                  period:
                    type: object
                    properties:
                      start: { type: string }
                      end: { type: string }
                      days: { type: integer }
                  lineItems:
                    type: array
                    items:
                      type: object
                      properties:
                        species: { type: string }
                        count: { type: integer }
                        dailyRate: { type: number }
                        days: { type: integer }
                        subtotal: { type: number }
                  summary:
                    type: object
                    properties:
                      subtotal: { type: number }
                      cageFees: { type: number }
                      total: { type: number }
        '400':
          $ref: '#/components/responses/BadRequest'

  /billing/usage:
    get:
      summary: Get current lab usage & plan limits (animal count, user count, monthly report count)
      tags: [Billing]
      parameters:
        - $ref: '#/components/parameters/LabId'
      responses:
        '200':
          description: Usage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan: { type: string }
                  limits: { $ref: '#/components/schemas/PlanLimits' }
                  usage:
                    type: object
                    properties:
                      animalCount: { type: integer }
                      userCount: { type: integer }
                      reportsThisMonth: { type: integer }
                  isOverLimit: { type: boolean }
                  overLimitReasons:
                    type: array
                    items: { type: string }
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── License ─────────────────────────────────────────────
  /license/sign:
    post:
      summary: Sign report (verified if private key + plan allows, otherwise unverified)
      tags: [License]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reportHash: { type: string, description: SHA-256 hash of report }
                reportData: { type: string, description: Raw report data (hash computed automatically) }
      responses:
        '200':
          description: Signature result
          content:
            application/json:
              schema:
                type: object
                properties:
                  signature: { type: string }
                  reportHash: { type: string }
                  type: { type: string, enum: [verified, unverified] }
                  signedAt: { type: string, format: date-time }
        '400':
          $ref: '#/components/responses/BadRequest'

  /license/verify:
    post:
      summary: Verify report signature
      tags: [License]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signature]
              properties:
                signature: { type: string }
                reportHash: { type: string }
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  type: { type: string }
                  signedAt: { type: string, format: date-time }

  /license/verify/{hash}:
    get:
      summary: Verify signature by report hash from audit log (public, no auth required)
      security: []
      tags: [License]
      parameters:
        - name: hash
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Verification result
        '404':
          description: No signature found for this hash

  /license/status:
    get:
      summary: Get license status (deploy ID, private key availability, plan limits)
      security: []
      tags: [License]
      responses:
        '200':
          description: License status
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployId: { type: string }
                  hasPrivateKey: { type: boolean }
                  plan: { type: string }
                  limits: { $ref: '#/components/schemas/PlanLimits' }

  /license/renew:
    post:
      summary: Generate offline renewal code (7-day validity)
      tags: [License]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deployId]
              properties:
                deployId: { type: string }
      responses:
        '200':
          description: Renewal code
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: string }
                  expiresAt: { type: string, format: date-time }

  # ── Subscriptions (PayPal) ──────────────────────────────
  /subscriptions/create:
    post:
      summary: Create PayPal subscription (free plan activates directly, paid returns approve URL)
      tags: [Subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId, labId]
              properties:
                planId: { type: string }
                labId: { type: string }
      responses:
        '200':
          description: Subscription created
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptionId: { type: string }
                  status: { type: string }
                  approveUrl: { type: string, nullable: true }

  /subscriptions/activate:
    post:
      summary: Activate subscription (called after PayPal approval)
      tags: [Subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscriptionId, labId]
              properties:
                subscriptionId: { type: string }
                labId: { type: string }
      responses:
        '200':
          description: Activated

  /subscriptions/cancel:
    post:
      summary: Cancel subscription (calls PayPal cancel API + marks cancelAtPeriodEnd)
      tags: [Subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [labId]
              properties:
                labId: { type: string }
                reason: { type: string }
      responses:
        '200':
          description: Cancelled

  /subscriptions/status:
    get:
      summary: Get current subscription status
      tags: [Subscriptions]
      parameters:
        - $ref: '#/components/parameters/LabId'
      responses:
        '200':
          description: Subscription status

  /subscriptions/webhook:
    post:
      summary: PayPal webhook (handles ACTIVATED/CANCELLED/SUSPENDED/PAYMENT.FAILED)
      security: []
      tags: [Subscriptions]
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook processed
        '400':
          description: Invalid webhook signature

  # ── Stripe ──────────────────────────────────────────────
  /stripe/config:
    get:
      summary: Get Stripe publishable key & plan config (public, no auth required)
      security: []
      tags: [Stripe]
      responses:
        '200':
          description: Stripe config
          content:
            application/json:
              schema:
                type: object
                properties:
                  publishableKey: { type: string }
                  plans:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        monthlyPrice: { type: number }
                        annualPrice: { type: number }

  /stripe/create:
    post:
      summary: Create Stripe Checkout Session (free plan activates directly, 30-day trial for paid)
      tags: [Stripe]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId, labId]
              properties:
                planId: { type: string }
                labId: { type: string }
                billing: { type: string, enum: [monthly, annual] }
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId: { type: string, nullable: true }
                  url: { type: string, nullable: true }

  /stripe/webhook:
    post:
      summary: Stripe webhook (checkout.session.completed / subscription.updated / subscription.deleted / invoice.payment_failed)
      security: []
      tags: [Stripe]
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook processed
        '400':
          description: Invalid webhook signature

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string }
    LabId:
      name: labId
      in: query
      required: true
      schema: { type: string }
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 20 }

  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        role: { type: string }

    Lab:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        institution: { type: string }
        address: { type: string }
        members:
          type: array
          items: { $ref: '#/components/schemas/LabMember' }

    LabMember:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        role: { type: string }
        user: { $ref: '#/components/schemas/User' }

    Animal:
      type: object
      properties:
        id: { type: string }
        internalId: { type: string }
        species: { type: string }
        sex: { type: string }
        strain: { type: string }
        genotype: { type: string }
        dateOfBirth: { type: string, format: date }
        source: { type: string }
        status: { type: string }
        cageId: { type: string }
        protocolId: { type: string }
        notes: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PlanLimits:
      type: object
      properties:
        maxAnimals: { type: integer }
        maxUsers: { type: integer }
        maxReportsPerMonth: { type: integer, description: "-1 means unlimited" }
        hasApiAccess: { type: boolean }
        hasAAALACSupport: { type: boolean }

    Error:
      type: object
      properties:
        error: { type: string }

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Unauthorized (missing or invalid token)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
