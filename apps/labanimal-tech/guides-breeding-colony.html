        Breeding Colony Management:<br>Tracking Genetics and Pedigree
      </h1>
      <p class="text-lg text-gray-600 mb-6">
        Effective breeding colony management requires balancing animal supply with demand, maintaining genetic integrity, and documenting pedigree across generations. This guide covers best practices for setting up and running a compliant breeding program.
      </p>

    <section class="mb-12">
      <h2 class="text-2xl font-bold text-gray-900 mb-4">Why Colony Management Matters</h2>
      <p class="text-gray-700 leading-relaxed mb-4">
        Breeding colonies are the backbone of many research programs. Poorly managed colonies lead to genetic drift, inbreeding depression, supply shortages, surplus animal waste, and compliance issues. A well-managed colony ensures a reliable supply of genetically defined animals while minimizing costs and animal numbers.
      </p>
      <p class="text-gray-700 leading-relaxed">
        The Guide for the Care and Use of Laboratory Animals emphasizes that breeding programs must be scientifically justified, genetically monitored, and managed to minimize the number of animals produced beyond research needs.
      </p>
    </section>

    <section id="step1" class="mb-12">
      <div class="flex items-center gap-3 mb-4">
        <span class="flex-shrink-0 w-10 h-10 bg-brand-600 text-white rounded-full flex items-center justify-center font-bold">1</span>
        <h2 class="text-2xl font-bold text-gray-900">Define Colony Goals</h2>
      </div>
      <p class="text-gray-700 leading-relaxed mb-4">
        Before setting up a colony, clearly define its purpose:
      </p>
      <ul class="list-disc list-inside text-gray-700 space-y-2 mb-4">
        <li><strong>Production breeding:</strong> Maintaining a steady supply of animals (often wild-type or common strains) for multiple experiments. Focus on efficiency and throughput.</li>
        <li><strong>Experimental breeding:</strong> Generating animals with specific genotypes (e.g., homozygous knockouts, conditional alleles) for a particular study. Focus on precision and genetic accuracy.</li>
        <li><strong>Colony maintenance:</strong> Preserving a rare or valuable strain for future use. Focus on genetic integrity and long-term viability.</li>
      </ul>
      <p class="text-gray-700 leading-relaxed">
        Document colony goals in your IACUC protocol, including the justification for the number of breeding pairs and expected animal production.
      </p>
    </section>

    <section id="step2" class="mb-12">
      <div class="flex items-center gap-3 mb-4">
        <span class="flex-shrink-0 w-10 h-10 bg-brand-600 text-white rounded-full flex items-center justify-center font-bold">2</span>
        <h2 class="text-2xl font-bold text-gray-900">Set Up Genetic Tracking System</h2>
      </div>
      <p class="text-gray-700 leading-relaxed mb-4">
        Every animal in a breeding colony must have documented genetic information:
      </p>
      <ul class="list-disc list-inside text-gray-700 space-y-2 mb-4">
        <li><strong>Strain designation:</strong> Use standardized nomenclature (e.g., B6.129P2-Emtm1Unc/J for a specific knockout mouse)</li>
        <li><strong>Genotype:</strong> Homozygous, heterozygous, or wild-type for each relevant allele</li>
        <li><strong>Generation number:</strong> Track which filial generation (F1, F2, etc.) each animal represents</li>
        <li><strong>Genetic background:</strong> Inbred, outbred, or mixed background; note any congenic or consomic designations</li>
        <li><strong>Genotyping records:</strong> Link each animal to its genotyping results (date, method, result)</li>
      </ul>
      <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
        <p class="text-blue-800 text-sm">
          <strong>Pro Tip:</strong> Standardize nomenclature from the start. Correcting naming inconsistencies later is time-consuming and error-prone. Use Jackson Laboratory or MGI naming conventions.
        </p>
      </div>
    </section>

    <section id="step3" class="mb-12">
      <div class="flex items-center gap-3 mb-4">
        <span class="flex-shrink-0 w-10 h-10 bg-brand-600 text-white rounded-full flex items-center justify-center font-bold">3</span>
        <h2 class="text-2xl font-bold text-gray-900">Implement Breeding Pairs Management</h2>
      </div>
      <p class="text-gray-700 leading-relaxed mb-4">
        Effective pair management is the core of colony operations:
      </p>
      <ul class="list-disc list-inside text-gray-700 space-y-2 mb-4">
        <li><strong>Pairing schedules:</strong> Record when pairs are set up, expected mating outcomes, and separation dates</li>
        <li><strong>Pair types:</strong> Monogamous (1 male + 1 female), polygamous (1 male + 2-3 females), or trio mating</li>
        <li><strong>Fertility tracking:</strong> Record time to first litter, litter intervals, and any failed breeding attempts</li>
        <li><strong>Replacement criteria:</strong> Define when to replace breeders (age, performance decline, genetic rotation)</li>
        <li><strong>Cage assignments:</strong> Track which breeding pairs are in which cages, with history of cage transfers</li>
      </ul>
    </section>

    <section id="step4" class="mb-12">
      <div class="flex items-center gap-3 mb-4">
        <span class="flex-shrink-0 w-10 h-10 bg-brand-600 text-white rounded-full flex items-center justify-center font-bold">4</span>
        <h2 class="text-2xl font-bold text-gray-900">Monitor Reproductive Performance</h2>
      </div>
      <p class="text-gray-700 leading-relaxed mb-4">
        Track these key performance indicators (KPIs) for your breeding colony:
      </p>
      <ul class="list-disc list-inside text-gray-700 space-y-2 mb-4">
        <li><strong>Litter size:</strong> Average number of pups per litter (strain-dependent; typically 6-12 for mice)</li>
        <li><strong>Pup survival rate:</strong> Percentage of pups surviving to weaning age (typically 21 days for mice)</li>
        <li><strong>Weaning success:</strong> Percentage of litters successfully weaned vs. lost</li>
        <li><strong>Inter-litter interval:</strong> Time between consecutive litters (typically 25-30 days for mice)</li>
        <li><strong>Breeding lifespan:</strong> How many litters a breeder produces before retirement</li>
      </ul>
      <p class="text-gray-700 leading-relaxed">
        Compare metrics across breeders, generations, and time periods. Underperforming breeders should be identified and replaced to maintain colony efficiency.
      </p>
    </section>

    <section id="step5" class="mb-12">
      <div class="flex items-center gap-3 mb-4">
        <span class="flex-shrink-0 w-10 h-10 bg-brand-600 text-white rounded-full flex items-center justify-center font-bold">5</span>
        <h2 class="text-2xl font-bold text-gray-900">Track Pedigree and Prevent Inbreeding</h2>
      </div>
      <p class="text-gray-700 leading-relaxed mb-4">
        Pedigree tracking is essential for genetic management:
      </p>
      <ul class="list-disc list-inside text-gray-700 space-y-2 mb-4">
        <li><strong>Pedigree records:</strong> Maintain parent-offspring relationships for at least 4 generations (more for outbred stocks)</li>
        <li><strong>Inbreeding coefficients:</strong> Calculate the inbreeding coefficient (F) for each animal. For outbred stocks, keep F below 0.01 (1%); for partially inbred lines, monitor for unexpected increases.</li>
        <li><strong>Outcrossing schedules:</strong> For outbred colonies, implement systematic outcrossing to maintain genetic diversity. Rotate breeders and avoid pairing animals with common ancestors within 4 generations.</li>
        <li><strong>Backcrossing:</strong> For transgenic lines on inbred backgrounds, backcross to the parental strain every 10 generations to prevent genetic drift.</li>
      </ul>
      <div class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg">
        <p class="text-amber-800 text-sm">
          <strong>Common Finding:</strong> Many colonies lose track of pedigree after 3-4 generations. Use colony management software that automatically calculates inbreeding coefficients and warns you before problems develop.
        </p>
      </div>
    </section>

    <section id="step6" class="mb-12">
      <div class="flex items-center gap-3 mb-4">
        <span class="flex-shrink-0 w-10 h-10 bg-brand-600 text-white rounded-full flex items-center justify-center font-bold">6</span>
        <h2 class="text-2xl font-bold text-gray-900">Manage Colony Size</h2>
      </div>
      <p class="text-gray-700 leading-relaxed mb-4">
        Balancing colony size with demand is critical for animal welfare and cost management:
      </p>
      <ul class="list-disc list-inside text-gray-700 space-y-2 mb-4">
        <li><strong>Demand forecasting:</strong> Track usage rates over time and adjust breeding output accordingly</li>
        <li><strong>Buffer stock:</strong> Maintain a 20-30% buffer above projected demand to account for breeding failures or unexpected needs</li>
        <li><strong>Surplus management:</strong> When production exceeds demand, transfer animals to other investigators, reduce breeding pairs, or humanely euthanize excess animals per IACUC-approved protocols</li>
        <li><strong>Cage density:</strong> Monitor cage density as colonies grow; transfer or wean pups before overcrowding occurs</li>
      </ul>
    </section>

    <section id="step7" class="mb-12">
      <div class="flex items-center gap-3 mb-4">
        <span class="flex-shrink-0 w-10 h-10 bg-brand-600 text-white rounded-full flex items-center justify-center font-bold">7</span>
        <h2 class="text-2xl font-bold text-gray-900">Generate Colony Reports</h2>
      </div>
      <p class="text-gray-700 leading-relaxed mb-4">
        Regular reporting keeps your colony management transparent and data-driven:
      </p>
      <ul class="list-disc list-inside text-gray-700 space-y-2 mb-4">
        <li><strong>Colony census:</strong> Total animals by strain, genotype, sex, and age</li>
        <li><strong>Production metrics:</strong> Litters born, pups weaned, and survival rates for the reporting period</li>
        <li><strong>Genetic diversity:</strong> Inbreeding coefficients, number of active breeding lines, and outcrossing status</li>
        <li><strong>Usage balance:</strong> Animals produced vs. animals used, with surplus projections</li>
        <li><strong>Breeder performance:</strong> Individual breeder KPIs and replacement recommendations</li>
      </ul>
      <div class="bg-green-50 border-l-4 border-green-500 p-4 rounded-r-lg">
        <p class="text-green-800 text-sm">
          <strong>LabAnimal Feature:</strong> Generate colony management reports with one click. Track pedigree, calculate inbreeding coefficients, and monitor breeding performance across your entire colony from a single dashboard.
        </p>
      </div>
    </section>

    <!-- FAQ -->
    <section class="mb-12">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">Frequently Asked Questions</h2>

      <div class="space-y-6">
        <div class="border border-gray-200 rounded-lg p-6">
          <h3 class="font-semibold text-gray-900 mb-2">How do you track lab animal genetics?</h3>
          <p class="text-gray-700">Lab animal genetics are tracked through genotyping records (PCR, gel electrophoresis, or sequencing results), pedigree databases that record parent-offspring relationships, and colony management software that links genotype data to individual animal records. Standard nomenclature (e.g., Jackson Laboratory conventions) ensures consistent identification across breeding programs and institutions.</p>
        </div>

        <div class="border border-gray-200 rounded-lg p-6">
          <h3 class="font-semibold text-gray-900 mb-2">What is the optimal breeding colony size?</h3>
          <p class="text-gray-700">Optimal colony size depends on your usage rate (how many animals per week/month you need), the reproductive capacity of the strain (litter size, generation time), and a safety buffer for unexpected demand or breeding failures. A common formula is: Colony size = (Weekly usage x Generation time in weeks) + Buffer (typically 20-30%). Over-colonizing wastes resources; under-colonizing causes supply shortages.</p>
        </div>

        <div class="border border-gray-200 rounded-lg p-6">
          <h3 class="font-semibold text-gray-900 mb-2">How do you prevent inbreeding in a colony?</h3>
          <p class="text-gray-700">Prevent inbreeding by maintaining complete pedigree records, calculating inbreeding coefficients (F values), and implementing structured outcrossing schedules. For outbred stocks, avoid pairing animals with common ancestors within 4 generations. For transgenic lines on inbred backgrounds, periodically backcross to the parental inbred strain (every 10 generations) to maintain genetic homogeneity. Use genotyping to verify genetic integrity.</p>
        </div>

        <div class="border border-gray-200 rounded-lg p-6">
          <h3 class="font-semibold text-gray-900 mb-2">When should breeding animals be replaced?</h3>
          <p class="text-gray-700">Replace breeding animals when they show declining reproductive performance (smaller litters, longer inter-litter intervals, increased pup mortality), reach an age threshold defined by your IACUC protocol (typically 6-8 months for mice, 8-12 months for rats), or when genetic management requires rotation. Track individual breeder performance over time to make data-driven replacement decisions.</p>
        </div>

        <div class="border border-gray-200 rounded-lg p-6">
          <h3 class="font-semibold text-gray-900 mb-2">How do you manage surplus animals from breeding colonies?</h3>
          <p class="text-gray-700">Surplus animals should be managed through: (1) adjusting breeding output to match actual demand, (2) transferring animals to other investigators who need the same strain, (3) weaning and separating pups early to prevent unintended breeding, and (4) humane euthanasia following IACUC-approved protocols when no use is available. All culling decisions must be documented and follow the institution's animal welfare policies.</p>
        </div>
      </div>
    </section>
