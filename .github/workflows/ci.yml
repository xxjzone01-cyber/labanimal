name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 合规引擎：零依赖，完全独立流水线
  compliance:
    name: Compliance Engine (95% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @labanimal/compliance build
      - run: pnpm --filter @labanimal/compliance test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: compliance-coverage
          path: packages/compliance/coverage/
          retention-days: 14

  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @labanimal/compliance build
      - run: pnpm --filter @labanimal/db exec prisma generate
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: pnpm audit --audit-level moderate || true
      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets..."
          ! grep -rn "password\s*=\s*['\"]" --include="*.ts" --include="*.tsx" packages/api/src packages/app/src || echo "No hardcoded passwords found"
          ! grep -rn "secret\s*=\s*['\"]" --include="*.ts" --include="*.tsx" packages/api/src | grep -v "test-secret" | grep -v "dev-secret" | grep -v "DEFAULT_SECRET" || echo "No hardcoded secrets found"

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: labanimal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/labanimal_test
      JWT_SECRET: test-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @labanimal/compliance build
      - run: pnpm --filter @labanimal/db exec prisma generate
      - run: pnpm --filter @labanimal/db exec prisma migrate deploy
      - run: pnpm --filter @labanimal/db db:seed
      - name: Start API server
        env:
          DISABLE_RATE_LIMIT: 'true'
          SKIP_EMAIL_VERIFICATION: 'true'
        run: |
          pnpm --filter @labanimal/api dev &
          for i in $(seq 1 30); do
            curl -s http://localhost:3001/api/health > /dev/null 2>&1 && break
            sleep 1
          done
      - run: pnpm --filter @labanimal/api test

  test-app:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @labanimal/app build
