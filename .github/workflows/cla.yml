name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md#contributor-license-agreement-cla'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],github-actions[bot],bot*'
          # Custom messages
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, please sign our Contributor License Agreement (CLA).

            **To sign the CLA**, please visit: https://cla-assistant.io/${{ github.repository }}

            The CLA covers:
            - `packages/compliance/` contributions under **Apache 2.0**
            - Main repository contributions under **Apache-2.0**

            You retain ownership of your contributions.
          custom-pr-sign-comment: 'I have read the CLA Document and I sign the CLA'
          custom-allsigned-prcomment: |
            All contributors have signed the CLA. Thank you!
